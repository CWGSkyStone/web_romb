<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Romb</title>
  <link rel="stylesheet" href="bootstrap.css">
</head>
<body>
  <div class="container">
    <h1>Rombusz kerület/terület-számítása</h1>
    <form id="rhombusForm" action="">
      <div class="input">
        <label for="side" class = "form-label">Oldal</label>
        <input type="text" id="side" class ="form-control">
        <label for="angle" class = "form-label">Alfa szög</label>
        <input type="text" id="angle" class ="form-control">

        <button type="submit" class="btn btn-primary mt-2 mb-2">Számítás</button>
        <button type="reset" class="btn btn-danger mt-2 mb-2" id="delete">Törlés</button>
               
        <input type="text" id="perimeter" class ="form-control">
        <label for="perimeter" class = "form-label">Kerület</label>
        <input type="text" id="area" class ="form-control">
        <label for="area" class = "form-label">Terület</label>
      </div>
    </form>
  </div>
  <nav class="nav justify-content-center"><a href="about.html" class="nav-link">Névjegy</a></nav>
  <script src="bootstrap.js"></script>
  <script src="app.js" type="module"></script>  
</body>
</html>
